<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro FF – Golden System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #daa520;
  --gold-dark: #b8860b;
  --gold-light: #f0c040;
  --brown: #8b4513;
  --brown-light: #a0522d;
  --cream: #fffaf0;
  --cream2: #f5f5dc;
  --bg-grad: linear-gradient(135deg,#b8860b 0%,#daa520 50%,#cd853f 100%);
  --card-bg: linear-gradient(145deg,#fff8dc,#f0e68c88);
  --text: #3b1a00;
  --sub: #a0522d;
  --border: #daa520;
  --input-bg: #fffaf0;
  --shadow: rgba(184,134,11,0.35);
  --header-bg: linear-gradient(45deg,#b8860b,#daa520,#cd853f);
  --container-bg: linear-gradient(145deg,#f5f5dc,#d2b48c);
  --danger: #c0392b;
  --success: #27ae60;
}
[data-theme="dark"] {
  --gold: #ffd700;
  --gold-dark: #c8a800;
  --gold-light: #ffe566;
  --brown: #f4c16e;
  --brown-light: #d4a55a;
  --cream: #1a1200;
  --cream2: #241a00;
  --bg-grad: linear-gradient(135deg,#1a1200 0%,#2d2000 50%,#1e1500 100%);
  --card-bg: linear-gradient(145deg,#2a1e00cc,#352800cc);
  --text: #faeaaa;
  --sub: #c8a050;
  --border: #c8a800;
  --input-bg: #1e1600;
  --shadow: rgba(255,215,0,0.18);
  --header-bg: linear-gradient(45deg,#2d2000,#c8a800,#3a2800);
  --container-bg: linear-gradient(145deg,#1a1200,#2d2000);
  --danger: #e74c3c;
  --success: #2ecc71;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg-grad);
  min-height:100vh;
  padding:20px;
  transition:background 0.4s;
}
.container{
  max-width:950px;margin:0 auto;
  background:var(--container-bg);
  border-radius:28px;
  box-shadow:0 30px 60px var(--shadow);
  overflow:hidden;
  border:2px solid var(--border);
  transition:background 0.4s;
}
/* HEADER */
.header{
  background:var(--header-bg);
  color:#fff;padding:36px 40px 28px;
  text-align:center;position:relative;
}
.header h1{
  font-family:'Rajdhani',sans-serif;
  font-size:2.7em;font-weight:700;letter-spacing:3px;
  text-shadow:2px 2px 8px rgba(0,0,0,0.4);
}
.header p{font-size:1.1em;opacity:.85;margin-top:6px}
.theme-btn{
  position:absolute;top:18px;right:18px;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.35);
  color:#fff;border-radius:50%;
  width:42px;height:42px;font-size:1.3em;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;
}
.theme-btn:hover{background:rgba(255,255,255,0.3);transform:rotate(20deg)}
/* NAV TABS */
.nav-tabs{
  display:flex;gap:0;border-bottom:3px solid var(--border);
  background:var(--cream2);
}
.nav-tab{
  flex:1;padding:14px 8px;text-align:center;
  font-weight:700;font-size:.95em;
  color:var(--sub);background:none;border:none;
  cursor:pointer;transition:all .25s;
  font-family:'Exo 2',sans-serif;
  letter-spacing:.5px;
}
.nav-tab.active{
  color:var(--gold-dark);
  border-bottom:3px solid var(--gold-dark);
  margin-bottom:-3px;background:var(--cream);
}
.nav-tab:hover:not(.active){background:rgba(218,165,32,.1)}
/* CONTENT */
.content{padding:40px 45px}
@media(max-width:600px){.content{padding:24px 14px}}
.section{display:none}
.section.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* FORM */
.form-group{margin-bottom:24px;position:relative}
label{display:block;margin-bottom:9px;font-weight:700;color:var(--brown);font-size:1em;letter-spacing:.3px}
input,select{
  width:100%;padding:15px 18px;
  border:2px solid var(--border);
  border-radius:12px;font-size:15px;
  background:var(--input-bg);color:var(--text);
  transition:all .3s;
  font-family:'Exo 2',sans-serif;
}
input:focus,select:focus{
  outline:none;border-color:var(--gold-dark);
  box-shadow:0 0 18px var(--shadow);
  transform:translateY(-2px);
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:520px){.form-row{grid-template-columns:1fr}}
.btn{
  width:100%;padding:17px;
  background:linear-gradient(45deg,var(--gold-dark),var(--gold));
  color:#fff;border:none;border-radius:13px;
  font-size:1.1em;font-weight:700;cursor:pointer;
  transition:all .3s;
  box-shadow:0 6px 18px var(--shadow);
  letter-spacing:1.2px;font-family:'Rajdhani',sans-serif;
  text-transform:uppercase;
}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 28px var(--shadow)}
.btn:active{transform:translateY(-1px)}
.btn-danger{background:linear-gradient(45deg,#a0522d,var(--danger))}
.btn-sm{padding:9px 18px;font-size:.9em;width:auto;border-radius:9px}
.btn-outline{
  background:none;border:2px solid var(--border);color:var(--brown);
  box-shadow:none;
}
.btn-outline:hover{background:rgba(218,165,32,.15)}
/* SEARCH BAR */
.search-bar{
  position:relative;margin-bottom:18px;
}
.search-bar input{padding-left:44px}
.search-bar .icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:1.2em;pointer-events:none;opacity:.6;
}
/* FILTER */
.filter-row{
  display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;
}
.filter-row select{flex:1;min-width:140px;padding:10px 14px}
.filter-row .btn-sm{flex-shrink:0}
/* STATS DASHBOARD */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;margin-bottom:26px;
}
.stat-card{
  background:var(--card-bg);
  border:2px solid var(--border);
  border-radius:16px;padding:20px 14px;
  text-align:center;
  box-shadow:0 6px 18px var(--shadow);
  transition:transform .25s;
}
.stat-card:hover{transform:translateY(-4px)}
.stat-card .val{
  font-size:2.1em;font-weight:900;
  color:var(--gold-dark);font-family:'Rajdhani',sans-serif;
}
.stat-card .lbl{font-size:.82em;color:var(--sub);margin-top:4px;font-weight:600}
/* REALTIME BADGE */
.rt-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(39,174,96,.15);
  border:1.5px solid #27ae60;
  border-radius:20px;padding:5px 14px;
  font-size:.85em;font-weight:700;color:#27ae60;
  margin-left:12px;
}
.rt-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* INTRO CARD */
.intro-item{
  background:var(--card-bg);
  border:2px solid var(--border);
  border-radius:18px;padding:24px;
  margin-bottom:20px;position:relative;
  box-shadow:0 8px 24px var(--shadow);
  transition:all .3s;
}
.intro-item:hover{transform:translateY(-4px);box-shadow:0 16px 36px var(--shadow)}
.player-name{
  font-size:1.4em;font-weight:700;
  color:var(--brown);margin-bottom:14px;
  font-family:'Rajdhani',sans-serif;letter-spacing:.5px;
}
.player-info{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px;
}
.info-item{
  background:var(--input-bg);padding:13px 10px;
  border-radius:11px;text-align:center;
  border:1.5px solid var(--border);
}
.info-label{font-size:.78em;color:var(--sub);margin-bottom:5px;font-weight:600}
.info-value{font-weight:700;color:var(--text);font-size:1.05em}
.timestamp{color:var(--sub);font-size:.88em;text-align:right;font-weight:500}
.delete-btn{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(45deg,#cd853f,var(--danger));
  color:#fff;border:none;font-size:1em;cursor:pointer;
  box-shadow:0 4px 12px rgba(180,50,50,.3);
  transition:all .3s;display:flex;align-items:center;justify-content:center;
}
.delete-btn:hover{transform:scale(1.15);box-shadow:0 6px 18px rgba(180,50,50,.5)}
/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--sub);font-size:1.15em}
/* TOAST */
.toast{
  position:fixed;bottom:28px;right:24px;
  padding:14px 22px;border-radius:13px;
  font-weight:700;font-size:.95em;z-index:9999;
  color:#fff;pointer-events:none;
  transform:translateY(80px);opacity:0;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  font-family:'Exo 2',sans-serif;
  max-width:320px;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:linear-gradient(135deg,#1a6b3c,#27ae60)}
.toast.error{background:linear-gradient(135deg,#7b1515,#c0392b)}
.toast.info{background:linear-gradient(135deg,#1a4b6b,#2980b9)}
/* CONFIRM MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:8888;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--container-bg);border:2px solid var(--border);
  border-radius:20px;padding:36px 32px;text-align:center;
  max-width:340px;width:90%;
  box-shadow:0 20px 50px var(--shadow);animation:fadeIn .3s ease;
}
.modal-box h3{color:var(--brown);font-size:1.3em;margin-bottom:12px;font-family:'Rajdhani',sans-serif}
.modal-box p{color:var(--sub);margin-bottom:24px;font-size:.95em}
.modal-btns{display:flex;gap:12px}
.modal-btns .btn{flex:1;padding:13px}
/* SPAM GUARD */
.spam-info{
  background:rgba(218,165,32,.12);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 16px;
  font-size:.85em;color:var(--sub);margin-bottom:18px;text-align:center;
}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
/* ROLE SELECTOR */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
.role-card{
  background:var(--card-bg);
  border:2px solid var(--border);
  border-radius:18px;padding:32px 16px;
  text-align:center;cursor:pointer;
  transition:all .3s;
  box-shadow:0 8px 24px var(--shadow);
  font-family:'Exo 2',sans-serif;
}
.role-card:hover{transform:translateY(-6px);box-shadow:0 16px 36px var(--shadow);border-color:var(--gold-dark)}
.role-icon{font-size:2.8em;margin-bottom:12px}
.role-label{font-size:1.25em;font-weight:700;color:var(--brown);font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.role-desc{font-size:.82em;color:var(--sub);margin-top:5px}
.back-btn{
  background:none;border:1.5px solid var(--border);
  color:var(--sub);border-radius:9px;padding:7px 16px;
  font-size:.88em;cursor:pointer;margin-bottom:22px;
  font-family:'Exo 2',sans-serif;font-weight:600;
  transition:all .25s;
}
.back-btn:hover{background:rgba(218,165,32,.12);color:var(--brown)}
/* login card center */
.login-card{max-width:420px;margin:0 auto}
.login-icon{font-size:3.5em;text-align:center;margin-bottom:18px}
.section-title{text-align:center;margin-bottom:32px;color:var(--brown);font-size:1.9em;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.divider{height:2px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:22px 0}
/* REMEMBER ME */
.remember-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;cursor:pointer;
  user-select:none;
}
.remember-row input[type=checkbox]{
  width:20px;height:20px;padding:0;
  accent-color:var(--gold-dark);
  border-radius:5px;cursor:pointer;
  flex-shrink:0;
}
.remember-row span{font-size:.92em;color:var(--sub);font-weight:600}
/* DEVICE LOCKED BANNER */
.locked-banner{
  background:linear-gradient(135deg,rgba(218,165,32,.18),rgba(184,134,11,.12));
  border:2px solid var(--border);border-radius:14px;
  padding:22px 20px;text-align:center;margin-bottom:20px;
}
.locked-banner .lock-icon{font-size:2.4em;margin-bottom:8px}
.locked-banner h3{color:var(--brown);font-family:'Rajdhani',sans-serif;font-size:1.2em;margin-bottom:6px}
.locked-banner p{color:var(--sub);font-size:.88em;line-height:1.5}
/* NEW ITEM ANIMATION */
@keyframes slideIn{
  from{opacity:0;transform:translateY(-20px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.intro-item.new-item{animation:slideIn .5s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="theme-btn" id="themeBtn" title="Toggle Dark Mode">🌙</button>
    <h1>🎮 INTRO FF 🎮</h1>
    <p>Golden Intro System</p>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs" id="navTabs" style="display:none">
    <button class="nav-tab active" onclick="switchTab('introSection',this)">📝 Intro</button>
    <button class="nav-tab" onclick="switchTab('adminSection',this)">👨‍💼 Admin</button>
  </div>

  <div class="content">
    <!-- PILIH ROLE -->
    <div id="loginSection" class="section active">
      <div class="login-card">
        <div class="login-icon">🎮</div>
        <div class="section-title">Masuk Sebagai</div>
        <div class="role-grid">
          <button class="role-card" onclick="selectRole('user')">
            <div class="role-icon">👤</div>
            <div class="role-label">User</div>
            <div class="role-desc">Daftar intro FF kamu</div>
          </button>
          <button class="role-card" onclick="selectRole('admin')">
            <div class="role-icon">🔐</div>
            <div class="role-label">Admin</div>
            <div class="role-desc">Kelola semua data</div>
          </button>
        </div>
      </div>
    </div>

    <!-- LOGIN USER -->
    <div id="loginUserSection" class="section">
      <div class="login-card">
        <button class="back-btn" onclick="backToRole()">← Kembali</button>
        <div class="login-icon">👤</div>
        <div class="section-title">Login User</div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUserName" placeholder="Masukkan username" autocomplete="off">
        </div>
        <label class="remember-row">
          <input type="checkbox" id="rememberUser">
          <span>🔖 Ingat Saya di perangkat ini</span>
        </label>
        <button class="btn" onclick="doLoginUser()">MASUK</button>
      </div>
    </div>

    <!-- LOGIN ADMIN -->
    <div id="loginAdminSection" class="section">
      <div class="login-card">
        <button class="back-btn" onclick="backToRole()">← Kembali</button>
        <div class="login-icon">🔐</div>
        <div class="section-title">Login Admin</div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginAdminUser" placeholder="Username admin" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginAdminPass" placeholder="Password admin">
        </div>
        <label class="remember-row">
          <input type="checkbox" id="rememberAdmin">
          <span>🔖 Ingat Saya di perangkat ini</span>
        </label>
        <button class="btn" onclick="doLoginAdmin()">LOGIN ADMIN</button>
      </div>
    </div>

    <!-- INTRO FORM -->
    <div id="introSection" class="section">
      <div class="section-title">📝 Form Intro</div>
      <div id="spamInfo" class="spam-info" style="display:none"></div>
      <div class="form-row">
        <div class="form-group">
          <label>ID FF (8–12 digit)</label>
          <input type="text" id="ffId" placeholder="12345678" maxlength="12" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>Nama In Game (2–12 char)</label>
          <input type="text" id="ingame" placeholder="NamaIG" maxlength="12">
        </div>
      </div>
      <div class="form-group">
        <label>Nama Asli</label>
        <input type="text" id="realname" placeholder="Nama Lengkap">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Level Akun</label>
          <input type="number" id="level" placeholder="80" min="1" max="999">
        </div>
        <div class="form-group">
          <label>Usia (10–60)</label>
          <input type="number" id="age" placeholder="20" min="10" max="60">
        </div>
      </div>
      <div class="form-group">
        <label>Kota</label>
        <input type="text" id="city" placeholder="Jakarta">
      </div>
      <button class="btn" onclick="doIntro()">🚀 INTRO SEKARANG</button>
      <div class="divider"></div>
      <button class="btn btn-danger" onclick="doLogout()">🚪 LOGOUT</button>
    </div>

    <!-- ADMIN -->
    <div id="adminSection" class="section">
      <div style="display:flex;align-items:center;justify-content:center;margin-bottom:24px;flex-wrap:wrap;gap:8px">
        <div class="section-title" style="margin:0">👨‍💼 Admin Panel</div>
        <span class="rt-badge"><span class="rt-dot"></span> REALTIME</span>
      </div>

      <!-- STATS -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="val" id="stTotal">0</div><div class="lbl">Total Intro</div></div>
        <div class="stat-card"><div class="val" id="stAvgAge">-</div><div class="lbl">Rata-rata Usia</div></div>
        <div class="stat-card"><div class="val" id="stAvgLvl">-</div><div class="lbl">Rata-rata Level</div></div>
        <div class="stat-card"><div class="val" id="stTopCity">-</div><div class="lbl">Kota Terbanyak</div></div>
      </div>

      <!-- SEARCH -->
      <div class="search-bar">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Cari nama, ID, kota..." oninput="renderList()">
      </div>

      <!-- FILTER -->
      <div class="filter-row">
        <select id="filterCity" onchange="renderList()">
          <option value="">Semua Kota</option>
        </select>
        <select id="filterLevel" onchange="renderList()">
          <option value="">Semua Level</option>
          <option value="1-50">Lv. 1–50</option>
          <option value="51-100">Lv. 51–100</option>
          <option value="101+">Lv. 100+</option>
        </select>
        <button class="btn btn-sm btn-outline" onclick="resetFilter()">Reset</button>
      </div>

      <div id="dataList"></div>
      <div class="divider"></div>
      <button class="btn btn-danger" onclick="doLogout()">🚪 LOGOUT ADMIN</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3>🗑️ Hapus Data?</h3>
    <p id="modalMsg">Yakin ingin menghapus data ini?</p>
    <div class="modal-btns">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger btn-sm" id="modalConfirm">Hapus</button>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const ADMIN_USER = 'lawliet';
const ADMIN_PASS = 'L';
const API = "https://introff.up.railway.app/intro";
const SPAM_LIMIT_MS = 60 * 60 * 1000; // 1 jam

// ============ STATE ============
let allData = [];
let currentUser = null;
let pendingDeleteId = null;
let audioCtx = null;
let sseSource = null;

// ============ DEVICE FINGERPRINT (1 device 1 form) ============
function getDeviceId() {
  const raw = [
    navigator.userAgent,
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.language,
    navigator.hardwareConcurrency || 0
  ].join('|');
  let h = 0;
  for (let i = 0; i < raw.length; i++) h = (Math.imul(31, h) + raw.charCodeAt(i)) | 0;
  return 'dev_' + Math.abs(h).toString(36);
}
const DEVICE_ID = getDeviceId();
const DEVICE_INTRO_KEY = `ff_device_done_${DEVICE_ID}`;

// ============ THEME ============
const themeBtn = document.getElementById('themeBtn');
const savedTheme = localStorage.getItem('ff_theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
themeBtn.onclick = () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ff_theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
  playSound('click');
};

// ============ SOUND ============
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const cfg = {
      click:   { freq:600, type:'sine',     dur:.08, vol:.12 },
      success: { freq:880, type:'triangle', dur:.28, vol:.18 },
      error:   { freq:220, type:'sawtooth', dur:.28, vol:.15 },
      delete:  { freq:350, type:'square',   dur:.22, vol:.12 },
      login:   { freq:740, type:'triangle', dur:.35, vol:.18 },
    };
    const c = cfg[type] || cfg.click;
    osc.type = c.type; osc.frequency.value = c.freq;
    gain.gain.setValueAtTime(c.vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + c.dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + c.dur);
  } catch(e) {}
}

// ============ TOAST ============
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`;
  t.textContent = msg;
  clearTimeout(toastTimer);
  setTimeout(() => t.classList.add('show'), 10);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ============ MODAL ============
function openModal(id, name) {
  pendingDeleteId = id;
  document.getElementById('modalMsg').textContent = `Hapus data "${name}"?`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalConfirm').onclick = () => { confirmDelete(); closeModal(); };
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ============ SECTION ============
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ ROLE SELECT ============
function selectRole(role) {
  playSound('click');
  showSection(role === 'admin' ? 'loginAdminSection' : 'loginUserSection');
}
function backToRole() {
  playSound('click');
  showSection('loginSection');
}

// ============ REMEMBER ME — auto login on load ============
function checkAutoLogin() {
  const saved = localStorage.getItem('ff_remember');
  if (!saved) return;
  try {
    const { role, user } = JSON.parse(saved);
    if (role === 'admin' && user === ADMIN_USER) {
      enterAdmin();
    } else if (role === 'user' && user) {
      enterUser(user);
    }
  } catch { localStorage.removeItem('ff_remember'); }
}

// ============ LOGIN USER ============
function doLoginUser() {
  playSound('click');
  const user = document.getElementById('loginUserName').value.trim();
  if (!user) { showToast('❌ Username kosong!','error'); playSound('error'); return; }
  const remember = document.getElementById('rememberUser').checked;
  if (remember) localStorage.setItem('ff_remember', JSON.stringify({ role:'user', user }));
  enterUser(user);
}

function enterUser(user) {
  currentUser = user;
  showSection('introSection');
  playSound('login');
  showToast(`✅ Halo, ${user}! Silakan intro.`, 'success');
  checkDeviceLocked();
}

// ============ LOGIN ADMIN ============
function doLoginAdmin() {
  playSound('click');
  const user = document.getElementById('loginAdminUser').value.trim();
  const pass = document.getElementById('loginAdminPass').value.trim();
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    const remember = document.getElementById('rememberAdmin').checked;
    if (remember) localStorage.setItem('ff_remember', JSON.stringify({ role:'admin', user }));
    enterAdmin();
  } else {
    showToast('❌ Username atau password salah!','error'); playSound('error');
  }
}

function enterAdmin() {
  currentUser = 'admin';
  showSection('adminSection');
  loadData();
  startSSE();
  playSound('login');
  showToast('✅ Login admin berhasil!','success');
}

// ============ 1 DEVICE 1 FORM ============
function checkDeviceLocked() {
  const done = localStorage.getItem(DEVICE_INTRO_KEY);
  const info = document.getElementById('spamInfo');
  const btn = document.querySelector('#introSection .btn');

  if (done) {
    // Tampilkan banner locked, sembunyikan form
    document.querySelectorAll('#introSection input').forEach(i => { i.disabled = true; i.style.opacity = '.5'; });
    if (btn) { btn.disabled = true; btn.style.opacity = '.5'; btn.textContent = '✅ Sudah Intro'; }
    info.style.display = 'block';
    info.innerHTML = `🔒 <strong>Perangkat ini sudah pernah mengisi form intro.</strong><br><span style="font-size:.85em">Hanya bisa 1 kali per perangkat.</span>`;
    return true;
  }
  // Reset jika belum
  document.querySelectorAll('#introSection input').forEach(i => { i.disabled = false; i.style.opacity = '1'; });
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '🚀 INTRO SEKARANG'; }
  info.style.display = 'none';
  return false;
}

// ============ INTRO ============
function doIntro() {
  playSound('click');
  if (checkDeviceLocked()) {
    showToast('🔒 Perangkat ini sudah pernah intro!','error'); playSound('error'); return;
  }

  const ffid     = document.getElementById('ffId').value.trim();
  const ingame   = document.getElementById('ingame').value.trim();
  const realname = document.getElementById('realname').value.trim();
  const level    = document.getElementById('level').value.trim();
  const age      = parseInt(document.getElementById('age').value);
  const city     = document.getElementById('city').value.trim();

  if (!/^\d{8,12}$/.test(ffid))         { showToast('❌ ID FF harus 8–12 digit angka!','error');playSound('error');return; }
  if (ingame.length<2||ingame.length>12) { showToast('❌ Nama IG 2–12 karakter!','error');playSound('error');return; }
  if (!realname||!level||!age||!city)    { showToast('❌ Isi semua field!','error');playSound('error');return; }
  if (age<10||age>60)                    { showToast('❌ Usia 10–60 tahun!','error');playSound('error');return; }

  const newData = {
    ffId: ffid, namaInGame: ingame, namaReal: realname,
    levelAkun: parseInt(level), usia: age, kota: city,
    tanggal: new Date().toLocaleDateString('id-ID'),
    waktu: new Date().toLocaleTimeString('id-ID')
  };

  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newData) })
    .then(r => r.json())
    .then(() => {
      // Kunci device ini selamanya
      localStorage.setItem(DEVICE_INTRO_KEY, Date.now().toString());
      showToast('✅ Intro berhasil dikirim!','success'); playSound('success');
      checkDeviceLocked(); // update UI jadi locked
    })
    .catch(() => { showToast('❌ Gagal kirim ke server','error'); playSound('error'); });
}

// ============ SSE REALTIME (admin) ============
function startSSE() {
  if (sseSource) sseSource.close();

  sseSource = new EventSource(`${API}/stream`);

  // Event: data baru masuk
  sseSource.addEventListener('new_intro', e => {
    const item = JSON.parse(e.data);
    // hindari duplikat
    if (!allData.find(d => d._id === item._id)) {
      allData.unshift(item);
      updateStats();
      renderList();
      populateCityFilter();
      // animasi card pertama
      const el = document.getElementById(`item-${item._id}`);
      if (el) el.classList.add('new-item');
      showToast(`🆕 Intro baru: ${item.namaInGame}`, 'success');
      playSound('success');
    }
  });

  // Event: data dihapus dari device lain
  sseSource.addEventListener('delete_intro', e => {
    const { _id } = JSON.parse(e.data);
    allData = allData.filter(d => d._id !== _id);
    updateStats(); renderList(); populateCityFilter();
  });

  sseSource.onerror = () => {
    // SSE putus, coba reconnect otomatis setelah 5 detik
    sseSource.close();
    setTimeout(() => { if (currentUser === 'admin') startSSE(); }, 5000);
  };
}

// ============ LOAD DATA ============
function loadData() {
  fetch(API)
    .then(r => r.json())
    .then(data => { allData = data; updateStats(); renderList(); populateCityFilter(); })
    .catch(() => showToast('⚠️ Gagal ambil data','error'));
}

// ============ STATS ============
function updateStats() {
  document.getElementById('stTotal').textContent = allData.length;
  if (!allData.length) {
    document.getElementById('stAvgAge').textContent = '-';
    document.getElementById('stAvgLvl').textContent = '-';
    document.getElementById('stTopCity').textContent = '-';
    return;
  }
  const avgAge = (allData.reduce((a,b)=>a+(b.usia||0),0)/allData.length).toFixed(1);
  const avgLvl = (allData.reduce((a,b)=>a+(b.levelAkun||0),0)/allData.length).toFixed(0);
  const cityCount = {};
  allData.forEach(d => { cityCount[d.kota] = (cityCount[d.kota]||0)+1; });
  const topCity = Object.entries(cityCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || '-';
  document.getElementById('stAvgAge').textContent = avgAge;
  document.getElementById('stAvgLvl').textContent = 'Lv'+avgLvl;
  document.getElementById('stTopCity').textContent = topCity;
}

// ============ CITY FILTER ============
function populateCityFilter() {
  const sel = document.getElementById('filterCity');
  const prev = sel.value;
  const cities = [...new Set(allData.map(d=>d.kota).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Semua Kota</option>' + cities.map(c=>`<option value="${c}">${c}</option>`).join('');
  sel.value = prev;
}

// ============ RENDER LIST ============
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fCity = document.getElementById('filterCity').value;
  const fLvl = document.getElementById('filterLevel').value;

  const filtered = allData.filter(d => {
    const match = !q || [d.namaInGame, d.namaReal, d.ffId, d.kota].some(v => String(v).toLowerCase().includes(q));
    const cityOk = !fCity || d.kota === fCity;
    let lvlOk = true;
    if (fLvl === '1-50') lvlOk = d.levelAkun <= 50;
    else if (fLvl === '51-100') lvlOk = d.levelAkun >= 51 && d.levelAkun <= 100;
    else if (fLvl === '101+') lvlOk = d.levelAkun > 100;
    return match && cityOk && lvlOk;
  });

  const list = document.getElementById('dataList');
  if (!filtered.length) { list.innerHTML = '<div class="empty">📭 Tidak ada data ditemukan</div>'; return; }

  list.innerHTML = filtered.map(item => `
    <div class="intro-item" id="item-${item._id}">
      <button class="delete-btn" onclick="openModal('${item._id}','${escHtml(item.namaInGame)}')" title="Hapus">🗑️</button>
      <div class="player-name">⚔️ ${escHtml(item.namaInGame)} <span style="font-size:.75em;opacity:.7">(${escHtml(item.namaReal)})</span></div>
      <div class="player-info">
        <div class="info-item"><div class="info-label">ID FF</div><div class="info-value">${escHtml(String(item.ffId))}</div></div>
        <div class="info-item"><div class="info-label">Level</div><div class="info-value">Lv.${item.levelAkun}</div></div>
        <div class="info-item"><div class="info-label">Usia</div><div class="info-value">${item.usia} thn</div></div>
        <div class="info-item"><div class="info-label">Kota</div><div class="info-value">${escHtml(item.kota)}</div></div>
      </div>
      <div class="timestamp">📅 ${item.tanggal} ⏰ ${item.waktu}</div>
    </div>
  `).join('');
}

function resetFilter() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCity').value = '';
  document.getElementById('filterLevel').value = '';
  renderList(); playSound('click');
}

// ============ DELETE ============
function confirmDelete() {
  if (!pendingDeleteId) return;
  const id = pendingDeleteId;
  fetch(`${API}/${id}`, { method:'DELETE' })
    .then(() => {
      allData = allData.filter(d => d._id !== id);
      updateStats(); renderList(); populateCityFilter();
      showToast('🗑️ Data berhasil dihapus','success'); playSound('delete');
    })
    .catch(() => { showToast('❌ Gagal hapus data','error'); playSound('error'); });
  pendingDeleteId = null;
}

// ============ LOGOUT ============
function doLogout() {
  playSound('click');
  if (sseSource) { sseSource.close(); sseSource = null; }
  localStorage.removeItem('ff_remember');
  currentUser = null;
  allData = [];
  document.getElementById('loginUserName').value = '';
  document.getElementById('loginAdminUser').value = '';
  document.getElementById('loginAdminPass').value = '';
  document.getElementById('rememberUser').checked = false;
  document.getElementById('rememberAdmin').checked = false;
  showSection('loginSection');
  showToast('👋 Logout berhasil','info');
}

// ============ UTIL ============
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key
document.getElementById('loginAdminPass').addEventListener('keydown', e => { if(e.key==='Enter') doLoginAdmin(); });
document.getElementById('loginAdminUser').addEventListener('keydown', e => { if(e.key==='Enter') doLoginAdmin(); });
document.getElementById('loginUserName').addEventListener('keydown', e => { if(e.key==='Enter') doLoginUser(); });

// ============ AUTO LOGIN ON PAGE LOAD ============
checkAutoLogin();
</script>
