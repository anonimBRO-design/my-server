<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader No Watermark - HD & MP3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ff0050, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="url"] {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e1e5e9;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="url"]:focus {
            border-color: #ff0050;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 0, 80, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff0050, #ff6b6b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 0, 80, 0.3);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff0050;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 2px solid #e9ecef;
        }

        .video-preview {
            width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #000;
        }

        .download-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ff0050;
            background: white;
            color: #ff0050;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .option-btn:hover, .option-btn.active {
            background: #ff0050;
            color: white;
        }

        .direct-download {
            display: block;
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .direct-download:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .instructions {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            .logo {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱 TikTok DL</div>
        <div class="subtitle">Download TikTok Video Tanpa Watermark - HD Quality</div>
        
        <div class="input-group">
            <i class="input-icon">🔗</i>
            <input type="url" id="tiktokUrl" placeholder="Paste link TikTok di sini... (contoh: https://www.tiktok.com/@username/video/123456789)" />
        </div>
        
        <button class="download-btn" onclick="downloadTikTok()">
            🚀 Download Video
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Mengambil video... Mohon tunggu</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <video class="video-preview" id="videoPreview" controls></video>
            <div class="download-options">
                <button class="option-btn active" onclick="selectQuality('hd')" id="hdBtn">🎥 HD Video</button>
                <button class="option-btn" onclick="selectQuality('mp3')" id="mp3Btn">🎵 MP3 Audio</button>
            </div>
            <a href="#" class="direct-download" id="downloadLink" download>⬇️ Download Sekarang</a>
        </div>
        
        <div class="instructions">
            <strong>📋 Cara Penggunaan:</strong><br>
            1. Copy link video TikTok<br>
            2. Paste di kolom atas<br>
            3. Klik "Download Video"<br>
            4. Pilih HD Video atau MP3 Audio<br>
            5. Klik Download Sekarang ✅
        </div>
    </div>

    <script>
        let currentVideoData = null;
        let currentQuality = 'hd';

        async function downloadTikTok() {
            const url = document.getElementById('tiktokUrl').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const btn = document.querySelector('.download-btn');

            // Reset
            error.style.display = 'none';
            result.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';

            if (!url) {
                showError('Masukkan link TikTok terlebih dahulu!');
                resetUI();
                return;
            }

            if (!isValidTikTokUrl(url)) {
                showError('Link TikTok tidak valid! Pastikan link lengkap.');
                resetUI();
                return;
            }

            try {
                // Extract TikTok video data menggunakan API eksternal
                const videoData = await fetchTikTokData(url);
                
                if (!videoData || !videoData.video || !videoData.video.noWatermark) {
                    throw new Error('Video tidak ditemukan atau tidak bisa diunduh');
                }

                currentVideoData = videoData;
                displayResult(videoData);
                
            } catch (err) {
                showError('Gagal mengambil video: ' + err.message + '\nCoba lagi atau gunakan link lain.');
            } finally {
                resetUI();
            }
        }

        async function fetchTikTokData(url) {
            // API endpoints untuk TikTok downloader (ganti dengan API yang aktif)
            const apis = [
                `https://tikwm.pw/api/?url=${encodeURIComponent(url)}`,
                `https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`,
                `https://tikwm.com/api/?url=${encodeURIComponent(url)}`
            ];

            for (const api of apis) {
                try {
                    const response = await fetch(api, {
                        method: 'GET',
                        headers: { 'User-Agent': 'Mozilla/5.0' }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        return parseVideoData(data, url);
                    }
                } catch (e) {
                    continue;
                }
            }
            
            throw new Error('Semua API tidak tersedia');
        }

        function parseVideoData(data, originalUrl) {
            // Parsing dari berbagai format API response
            if (data.data && data.data.play) {
                return {
                    title: data.data.title || 'TikTok Video',
                    author: data.data.author || 'Unknown',
                    video: {
                        noWatermark: data.data.play || data.data.hdplay,
                        withWatermark: data.data.wmplay
                    },
                    music: data.data.music
                };
            }
            
            if (data.video && data.video.noWatermark) {
                return {
                    title: data.title || 'TikTok Video',
                    author: data.author || 'Unknown',
                    video: data.video,
                    music: data.music
                };
            }
            
            throw new Error('Format data tidak dikenali');
        }

        function displayResult(data) {
            const result = document.getElementById('result');
            const videoPreview = document.getElementById('videoPreview');
            const downloadLink = document.getElementById('downloadLink');
            
            // Set preview video
            videoPreview.src = data.video.noWatermark;
            videoPreview.load();
            
            // Update download link
            updateDownloadLink();
            
            result.style.display = 'block';
            videoPreview.play().catch(() => {}); // Auto play jika memungkinkan
        }

        function selectQuality(quality) {
            currentQuality = quality;
            
            // Update button states
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(quality === 'hd' ? 'hdBtn' : 'mp3Btn').classList.add('active');
            
            updateDownloadLink();
        }

        function updateDownloadLink() {
            const downloadLink = document.getElementById('downloadLink');
            const data = currentVideoData;
            
            if (!data) return;
            
            if (currentQuality === 'hd') {
                downloadLink.href = data.video.noWatermark;
                downloadLink.download = `tiktok_hd_${Date.now()}.mp4`;
                downloadLink.textContent = '⬇️ Download HD Video (No Watermark)';
            } else {
                downloadLink.href = data.music || data.video.noWatermark;
                downloadLink.download = `tiktok_audio_${Date.now()}.mp3`;
                downloadLink.textContent = '⬇️ Download MP3 Audio';
            }
        }

        function isValidTikTokUrl(url) {
            const pattern = /^https?:\/\/(?:www\.)?(?:vm\.|vt\.|tiktok\.com)\/[@\w.-]+\/video\/\d+/;
            return pattern.test(url);
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function resetUI() {
            const loading = document.getElementById('loading');
            const btn = document.querySelector('.download-btn');
            
            loading.style.display = 'none';
            btn.disabled = false;
            btn.textContent = '🚀 Download Video';
        }

        // Enter key support
        document.getElementById('tiktokUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                downloadTikTok();
            }
        });

        // Copy to clipboard helper
        document.addEventListener('DOMContentLoaded', function() {
            const urlInput = document.getElementById('tiktokUrl');
            
            // Simulate paste from clipboard
            navigator.clipboard.readText().then(text => {
                if (isValidTikTokUrl(text)) {
                    urlInput.value = text;
                }
            }).catch(() => {});
        });
    </script>
</body>
</html>
