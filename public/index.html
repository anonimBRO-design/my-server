<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro FF – Golden System</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#daa520;
  --gold-dark:#b8860b;
  --gold-light:#f0c040;
  --brown:#8b4513;
  --brown-light:#a0522d;
  --cream:#fffaf0;
  --cream2:#f5f5dc;
  --bg-grad:linear-gradient(135deg,#b8860b 0%,#daa520 50%,#cd853f 100%);
  --card-bg:linear-gradient(145deg,#fff8dc,#f0e68c88);
  --text:#3b1a00;
  --sub:#a0522d;
  --border:#daa520;
  --input-bg:#fffaf0;
  --shadow:rgba(184,134,11,0.35);
  --header-bg:linear-gradient(45deg,#b8860b,#daa520,#cd853f);
  --container-bg:linear-gradient(145deg,#f5f5dc,#d2b48c);
  --danger:#c0392b;
  --success:#27ae60;
}

[data-theme="dark"]{
  --gold:#ffd700;
  --gold-dark:#c8a800;
  --gold-light:#ffe566;
  --brown:#f4c16e;
  --brown-light:#d4a55a;
  --cream:#1a1200;
  --cream2:#241a00;
  --bg-grad:linear-gradient(135deg,#1a1200 0%,#2d2000 50%,#1e1500 100%);
  --card-bg:linear-gradient(145deg,#2a1e00cc,#352800cc);
  --text:#faeaaa;
  --sub:#c8a050;
  --border:#c8a800;
  --input-bg:#1e1600;
  --shadow:rgba(255,215,0,0.18);
  --header-bg:linear-gradient(45deg,#2d2000,#c8a800,#3a2800);
  --container-bg:linear-gradient(145deg,#1a1200,#2d2000);
  --danger:#e74c3c;
  --success:#2ecc71;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg-grad);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:950px;
  margin:0 auto;
  background:var(--container-bg);
  border-radius:28px;
  overflow:hidden;
  border:2px solid var(--border);
  box-shadow:0 30px 60px var(--shadow);
}

/* HEADER */
.header{
  background:var(--header-bg);
  padding:36px;
  text-align:center;
  color:#fff;
  position:relative;
}

.header h1{
  font-family:'Rajdhani';
  font-size:2.5em;
}

.theme-btn{
  position:absolute;
  top:18px;
  right:18px;
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

/* NAV */
.nav-tabs{
  display:flex;
  border-bottom:3px solid var(--border);
}

.nav-tab{
  flex:1;
  padding:14px;
  background:none;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:var(--sub);
}

.nav-tab.active{
  background:var(--cream);
  border-bottom:3px solid var(--gold-dark);
  color:var(--gold-dark);
}

/* CONTENT */
.content{padding:40px}

.section{display:none}
.section.active{display:block}

.form-group{margin-bottom:20px}

label{display:block;margin-bottom:8px;color:var(--brown);font-weight:600}

input,select{
  width:100%;
  padding:14px;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--input-bg);
  color:var(--text);
}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,var(--gold-dark),var(--gold));
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* LOGIN CARD */
.login-card{
  max-width:420px;
  margin:auto;
  text-align:center;
}

.role-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.role-card{
  padding:30px;
  border-radius:16px;
  border:2px solid var(--border);
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 20px;
  border-radius:12px;
  color:#fff;
  opacity:0;
  transform:translateY(60px);
  transition:.3s;
}

.toast.show{opacity:1;transform:translateY(0)}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <button class="theme-btn" id="themeBtn">🌙</button>
    <h1>🎮 INTRO FF</h1>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab()">Intro</button>
    <button class="nav-tab">Admin</button>
  </div>

  <div class="content">

    <div id="loginSection" class="section active">
      <div class="login-card">
        <h2>Pilih Role</h2>
        <div class="role-grid">
          <div class="role-card" onclick="alert('user')">User</div>
          <div class="role-card" onclick="alert('admin')">Admin</div>
        </div>
      </div>
    </div>

    <div id="introSection" class="section">
      <div class="form-group">
        <label>ID FF</label>
        <input>
      </div>
      <button class="btn">INTRO</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const btn = document.getElementById("themeBtn");

btn.onclick = () => {
  document.body.classList.toggle("dark");
};

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}
</script>

</body>
</html>
