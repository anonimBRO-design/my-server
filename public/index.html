<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro FF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #b8860b 0%, #daa520 50%, #cd853f 100%);
            min-height: 100vh; 
            padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: linear-gradient(145deg, #f5f5dc, #d2b48c);
            border-radius: 25px; box-shadow: 0 25px 50px rgba(184, 134, 11, 0.4);
            overflow: hidden; border: 3px solid #daa520;
        }
        .header {
            background: linear-gradient(45deg, #b8860b, #daa520, #cd853f);
            color: #fff; padding: 40px; text-align: center;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.5);
        }
        .header h1 { 
            font-size: 2.8em; margin-bottom: 15px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        .content { padding: 50px; }
        .section { display: none; }
        .section.active { display: block; }
        .form-group { 
            margin-bottom: 30px; position: relative;
        }
        label { 
            display: block; margin-bottom: 12px; font-weight: 700; 
            color: #8b4513; font-size: 1.1em;
        }
        input { 
            width: 100%; padding: 18px; border: 3px solid #daa520;
            border-radius: 15px; font-size: 16px; background: #fffaf0;
            transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        input:focus { 
            outline: none; border-color: #b8860b; 
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.3), inset 0 2px 5px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .btn {
            width: 100%; padding: 20px; background: linear-gradient(45deg, #b8860b, #daa520);
            color: white; border: none; border-radius: 15px;
            font-size: 20px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(184, 134, 11, 0.4);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { 
            transform: translateY(-3px); box-shadow: 0 12px 25px rgba(184, 134, 11, 0.6);
        }
        .btn:active { transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(45deg, #cd853f, #a0522d); }
        .btn-success { background: linear-gradient(45deg, #daa520, #b8860b); }
        .intro-item {
            background: linear-gradient(145deg, #fff8dc, #f0e68c); 
            border: 3px solid #daa520; border-radius: 20px; 
            padding: 30px; margin-bottom: 25px; position: relative;
            box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3);
            transition: all 0.3s ease;
        }
        .intro-item:hover {
            transform: translateY(-5px); box-shadow: 0 15px 40px rgba(184, 134, 11, 0.5);
        }
        .player-name { 
            font-size: 1.6em; font-weight: bold; color: #8b4513; 
            margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .player-info { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; margin-bottom: 20px; 
        }
        .info-item { 
            background: linear-gradient(145deg, #fff, #f5f5dc); 
            padding: 20px; border-radius: 15px; text-align: center; 
            border: 2px solid #daa520; box-shadow: 0 5px 15px rgba(184, 134, 11, 0.2);
        }
        .info-label { 
            font-size: 0.95em; color: #a0522d; margin-bottom: 8px; font-weight: 600;
        }
        .info-value { 
            font-weight: bold; color: #8b4513; font-size: 1.2em;
        }
        .timestamp { 
            color: #a0522d; font-size: 1em; text-align: right; 
            margin-bottom: 15px; font-weight: 500;
        }
        .status { 
            padding: 12px 25px; border-radius: 30px; font-weight: 700; 
            text-align: center; background: linear-gradient(45deg, #f4a460, #daa520);
            color: #8b4513; display: inline-block; box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3);
        }
        .delete-btn {
            position: absolute; top: 15px; right: 15px;
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(45deg, #cd853f, #a0522d); color: white;
            border: none; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4); transition: all 0.3s;
        }
        .delete-btn:hover {
            transform: scale(1.1); box-shadow: 0 8px 20px rgba(184, 134, 11, 0.6);
        }
        .total-stats {
            background: linear-gradient(145deg, #fff8dc, #f0e68c);
            padding: 25px; border-radius: 20px; margin-bottom: 30px;
            border: 3px solid #daa520; text-align: center;
            box-shadow: 0 10px 25px rgba(184, 134, 11, 0.3);
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .content { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 INTRO FF 🎮</h1>
            <p style="font-size: 1.2em;">Golden Intro System</p>
        </div>
        <div class="content">
            <!-- LOGIN -->
            <div id="loginSection" class="section active">
                <h2 style="text-align: center; margin-bottom: 40px; color: #8b4513; font-size: 2em;">🔐 Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Password">
                </div>
                <button class="btn" onclick="doLogin()">LOGIN</button>
            </div>

            <!-- INTRO FORM -->
            <div id="introSection" class="section">
                <h2 style="text-align: center; margin-bottom: 40px; color: #8b4513; font-size: 2em;">📝 Form Intro</h2>
                <div class="form-group">
                    <label>ID FF (8-12 digit)</label>
                    <input type="text" id="ffId" placeholder="12345678" maxlength="12">
                </div>
                <div class="form-group">
                    <label>Nama In Game (2-12 char)</label>
                    <input type="text" id="ingame" placeholder="NamaIG" maxlength="12">
                </div>
                <div class="form-group">
                    <label>Nama Asli</label>
                    <input type="text" id="realname" placeholder="Nama Lengkap">
                </div>
                <div class="form-group">
                    <label>Level Akun</label>
                    <input type="number" id="level" placeholder="80" min="1">
                </div>
                <div class="form-group">
                    <label>Usia (max 60)</label>
                    <input type="number" id="age" placeholder="20" min="10" max="60">
                </div>
                <div class="form-group">
                    <label>Kota</label>
                    <input type="text" id="city" placeholder="Jakarta">
                </div>
                <button class="btn btn-success" onclick="doIntro()">INTRO SEKARANG</button>
                <br><br>
                <button class="btn btn-danger" onclick="doLogout()">LOGOUT</button>
            </div>

            <!-- ADMIN -->
            <div id="adminSection" class="section">
                <h2 style="text-align: center; margin-bottom: 30px; color: #8b4513; font-size: 2em;">👨‍💼 Admin Panel</h2>
                <div class="total-stats">
                    <strong>Total Intro: <span id="totalCount" style="color: #b8860b; font-size: 2em;">0</span></strong>
                </div>
                <div id="dataList"></div>
                <br>
                <button class="btn btn-danger" onclick="doLogout()">LOGOUT ADMIN</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_USER = 'ADMIN12345';
        const ADMIN_PASS = 'L';
        let data = JSON.parse(localStorage.getItem('introData')) || [];

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                showSection('adminSection');
                loadData();
                alert('✅ Admin login berhasil!');
            } else if (user) {
                showSection('introSection');
                alert('✅ Login berhasil! Silahkan intro.');
            } else {
                alert('❌ Username kosong!');
            }
        }

        function doIntro() {
            const deviceId = localStorage.getItem('deviceId') || 'dev_' + Date.now();
            localStorage.setItem('deviceId', deviceId);

            if (data.find(d => d.deviceId === deviceId)) {
                alert('❌ Sudah intro! 1 device = 1 intro');
                return;
            }

            const ffid = document.getElementById('ffId').value.trim();
            const ingame = document.getElementById('ingame').value.trim();
            const realname = document.getElementById('realname').value.trim();
            const level = document.getElementById('level').value.trim();
            const age = parseInt(document.getElementById('age').value);
            const city = document.getElementById('city').value.trim();

            if (!/^\d{8,12}$/.test(ffid)) return alert('❌ ID FF 8-12 digit angka!');
            if (ingame.length < 2 || ingame.length > 12) return alert('❌ Nama IG 2-12 karakter!');
            if (!realname || !level || !age || !city) return alert('❌ Isi semua field!');
            if (age > 60 || age < 10) return alert('❌ Usia 10-60 tahun!');

            const newData = {
                id: Date.now(),
                deviceId: deviceId,
                ffId: ffid,
                namaInGame: ingame,
                namaReal: realname,
                levelAkun: level,
                usia: age,
                kota: city,
                tanggal: new Date().toLocaleDateString('id-ID'),
                waktu: new Date().toLocaleTimeString('id-ID')
            };

            data.unshift(newData);
            localStorage.setItem('introData', JSON.stringify(data));
            alert('✅ INTRO BERHASIL! ✨');
            
            // Reset form
            document.querySelectorAll('#introSection input').forEach(input => input.value = '');
        }

        function loadData() {
            document.getElementById('totalCount').textContent = data.length;
            const list = document.getElementById('dataList');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:60px;color:#a0522d;font-size:1.3em">Belum ada data intro</div>';
                return;
            }

            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'intro-item';
                div.innerHTML = `
                    <button class="delete-btn" onclick="deleteData(${item.id})" title="Hapus">×</button>
                    <div class="player-name">${item.namaInGame} (${item.namaReal})</div>
                    <div class="player-info">
                        <div class="info-item">
                            <div class="info-label">ID FF</div>
                            <div class="info-value">${item.ffId}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Level</div>
                            <div class="info-value">Lv.${item.levelAkun}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Usia</div>
                            <div class="info-value">${item.usia} thn</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Kota</div>
                            <div class="info-value">${item.kota}</div>
                        </div>
                    </div>
                    <div class="timestamp">📅 ${item.tanggal} ⏰ ${item.waktu}</div>
                    <div class="status">✅ VERIFIED</div>
                `;
                list.appendChild(div);
            });
        }

        function deleteData(id) {
            if (confirm('Hapus data ini?')) {
                data = data.filter(item => item.id !== id);
                localStorage.setItem('introData', JSON.stringify(data));
                loadData();
                alert('✅ Data dihapus!');
            }
        }

        function doLogout() {
            showSection('loginSection');
        }

        // Enter key & auto load
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('loginSection').classList.contains('active')) {
                doLogin();
            }
        });

        window.onload = function() {
            if (localStorage.getItem('deviceId')) {
                showSection('introSection');
            }
        }
    </script>
</body>
</html>
