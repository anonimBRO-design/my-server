<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro FF – Golden System</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#daa520;
  --gold-dark:#b8860b;
  --bg:#fffaf0;
  --text:#3b1a00;
}

[data-theme="dark"]{
  --bg:#1a1200;
  --text:#faeaaa;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px;
  transition:.3s;
}

.container{
  max-width:900px;
  margin:auto;
  border:2px solid var(--gold);
  border-radius:20px;
  overflow:hidden;
}

.header{
  background:linear-gradient(45deg,var(--gold-dark),var(--gold));
  padding:30px;
  text-align:center;
  color:#fff;
  position:relative;
}

.theme-btn{
  position:absolute;
  right:15px;
  top:15px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  cursor:pointer;
}

.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  cursor:pointer;
  background:#eee;
  font-weight:bold;
}

.nav button.active{
  background:#fff;
  border-bottom:3px solid var(--gold);
}

.section{display:none;padding:30px}
.section.active{display:block}

.form-group{margin-bottom:15px}

input{
  width:100%;
  padding:12px;
  border:2px solid var(--gold);
  border-radius:10px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  background:linear-gradient(45deg,var(--gold-dark),var(--gold));
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  border-radius:10px;
}

/* ROLE */
.role{
  display:flex;
  gap:15px;
}

.role div{
  flex:1;
  padding:20px;
  border:2px solid var(--gold);
  text-align:center;
  cursor:pointer;
  border-radius:12px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  opacity:0;
  transform:translateY(50px);
  transition:.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>🎮 INTRO FF</h2>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>

  <div class="nav">
    <button class="active" id="tab1">Intro</button>
    <button id="tab2">Admin</button>
  </div>

  <div class="section active" id="intro">

    <div class="role">
      <div onclick="selectRole('user')">User</div>
      <div onclick="selectRole('admin')">Admin</div>
    </div>

    <div class="form-group">
      <label>ID FF</label>
      <input id="ffid">
    </div>

    <button class="btn" id="introBtn">INTRO</button>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ===== THEME (FIXED CSP SAFE) ===== */
const themeBtn = document.getElementById("themeBtn");

themeBtn.addEventListener("click", () => {
  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  showToast("Theme berubah");
});

/* ===== ROLE ===== */
function selectRole(r){
  showToast("Pilih: " + r);
}

/* ===== BUTTON FIX ===== */
document.getElementById("introBtn").addEventListener("click", () => {
  const val = document.getElementById("ffid").value;
  if(!val){
    showToast("ID kosong!");
    return;
  }
  showToast("Intro berhasil!");
});

/* ===== NAV FIX ===== */
document.getElementById("tab1").onclick = () => {
  document.getElementById("intro").classList.add("active");
};
document.getElementById("tab2").onclick = () => {
  showToast("Admin belum dibuat");
};

/* ===== TOAST ===== */
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}
</script>

</body>
</html>
