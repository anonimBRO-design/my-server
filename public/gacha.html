<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gacha Diamond FF</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b14;
      --card: #0f1525;
      --border: rgba(255,200,50,0.15);
      --gold: #ffcc00;
      --orange: #ff6b00;
      --blue: #00aaff;
      --text: #e8e4dc;
      --muted: #6b7280;
      --glow: rgba(255,204,0,0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-effect {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,107,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(0,170,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 20% 50%, rgba(255,204,0,0.05) 0%, transparent 60%);
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(255,204,0,0.4));
    }

    .header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Coin display */
    .coin-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,204,0,0.08);
      border: 1px solid rgba(255,204,0,0.2);
      border-radius: 50px;
      padding: 8px 20px;
      margin-bottom: 28px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      animation: fadeDown 0.6s 0.1s ease both;
      position: relative;
      z-index: 1;
    }

    .coin-icon { font-size: 1.2rem; }

    /* Gacha grid */
    .gacha-wrapper {
      position: relative;
      z-index: 1;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .gacha-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px;
      background: rgba(15,21,37,0.8);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(255,204,0,0.05), inset 0 0 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .gacha-box {
      width: 110px;
      height: 110px;
      border-radius: 14px;
      border: 1px solid rgba(255,204,0,0.2);
      background: linear-gradient(145deg, #0f1a2e, #0a1020);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .gacha-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,204,0,0.05), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gacha-box:hover { transform: translateY(-3px) scale(1.03); border-color: rgba(255,204,0,0.5); box-shadow: 0 8px 24px rgba(255,204,0,0.15); }
    .gacha-box:hover::before { opacity: 1; }

    .gacha-box .box-icon {
      font-size: 2rem;
      transition: transform 0.3s;
    }

    .gacha-box:hover .box-icon { transform: scale(1.15) rotate(-5deg); }

    .gacha-box .box-label {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Box states */
    .gacha-box.revealed {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
      animation: revealPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .gacha-box.revealed::before { opacity: 1; }

    @keyframes revealPop {
      0%   { transform: scale(0.8); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .gacha-box.spinning {
      animation: shake 0.3s ease infinite;
      border-color: var(--orange);
      box-shadow: 0 0 15px rgba(255,107,0,0.3);
    }

    @keyframes shake {
      0%,100% { transform: rotate(-3deg); }
      50%      { transform: rotate(3deg); }
    }

    /* Center spin button */
    .gacha-box.center-btn {
      background: linear-gradient(135deg, var(--orange), var(--gold));
      border: none;
      box-shadow: 0 8px 32px rgba(255,107,0,0.4);
      cursor: pointer;
    }

    .gacha-box.center-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 40px rgba(255,107,0,0.6);
    }

    .gacha-box.center-btn .box-icon { font-size: 1.6rem; }
    .gacha-box.center-btn .spin-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #0a0a0f;
      letter-spacing: 0.05em;
    }

    .gacha-box.center-btn .cost {
      font-size: 0.7rem;
      color: rgba(10,10,15,0.6);
      margin-top: 2px;
    }

    .gacha-box.center-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Result popup */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }

    .result-overlay.show { opacity: 1; pointer-events: all; }

    .result-card {
      background: linear-gradient(145deg, #0f1525, #0a1020);
      border: 1px solid var(--gold);
      border-radius: 24px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,204,0,0.2);
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .result-overlay.show .result-card { transform: scale(1); }

    .result-emoji { font-size: 4rem; display: block; margin-bottom: 16px; animation: bounce 0.6s ease infinite alternate; }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .result-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .result-desc { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }

    .btn-close {
      background: linear-gradient(135deg, var(--orange), var(--gold));
      border: none;
      border-radius: 50px;
      padding: 12px 32px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #0a0a0f;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.05em;
    }

    .btn-close:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,0,0.4); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(15,21,37,0.95);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.85rem;
      color: var(--text);
      transition: transform 0.3s ease;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 420px) {
      .gacha-box { width: 88px; height: 88px; }
      .gacha-box .box-icon { font-size: 1.6rem; }
      .header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<div class="bg-effect"></div>
<div class="particles" id="particles"></div>

<div class="header">
  <h1>💎 GACHA DIAMOND FF</h1>
  <p>Spin untuk mendapatkan hadiah spesial!</p>
</div>

<div class="coin-bar">
  <span class="coin-icon">🪙</span>
  <span id="coinCount">10</span> Coin
</div>

<div class="gacha-wrapper">
  <div class="gacha-grid" id="gachaGrid">
    <!-- 9 boxes generated by JS -->
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">💎</span>
    <div class="result-title" id="resultTitle">Selamat!</div>
    <div class="result-desc" id="resultDesc">Kamu mendapatkan hadiah!</div>
    <button class="btn-close" id="btnClose">Klaim Hadiah 🎉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Prizes pool
  const prizes = [
    { emoji: '💎', name: '50 Diamond', desc: 'Kamu dapat 50 Diamond FF!', rarity: 'rare' },
    { emoji: '💎', name: '100 Diamond', desc: 'Kamu dapat 100 Diamond FF!', rarity: 'epic' },
    { emoji: '💎', name: '500 Diamond', desc: 'JACKPOT! 500 Diamond FF!', rarity: 'legendary' },
    { emoji: '🎁', name: 'Skin Senjata', desc: 'Kamu dapat Skin Senjata!', rarity: 'rare' },
    { emoji: '👗', name: 'Skin Karakter', desc: 'Kamu dapat Skin Karakter!', rarity: 'epic' },
    { emoji: '🏆', name: 'Bundle Spesial', desc: 'JACKPOT! Bundle Spesial FF!', rarity: 'legendary' },
    { emoji: '⭐', name: '10 Diamond', desc: 'Kamu dapat 10 Diamond FF.', rarity: 'common' },
    { emoji: '🪙', name: '+2 Coin', desc: 'Kamu dapat 2 Coin bonus!', rarity: 'common', bonus: true },
    { emoji: '🎯', name: 'Emote Keren', desc: 'Kamu dapat Emote eksklusif!', rarity: 'rare' },
  ];

  const boxIcons = ['❓','❓','❓','❓','❓','❓','❓','❓','❓'];
  let coins = 10;
  let spinning = false;

  const grid = document.getElementById('gachaGrid');
  const coinEl = document.getElementById('coinCount');

  // Build grid
  function buildGrid() {
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const box = document.createElement('div');
      box.className = 'gacha-box';
      box.id = 'box-' + i;

      if (i === 4) {
        // Center = spin button
        box.classList.add('center-btn');
        box.innerHTML = `
          <span class="box-icon">🎰</span>
          <span class="spin-text">SPIN</span>
          <span class="cost">🪙 1 Coin</span>
        `;
        box.addEventListener('click', doSpin);
      } else {
        box.innerHTML = `
          <span class="box-icon">${boxIcons[i]}</span>
          <span class="box-label">Kotak ${i < 4 ? i+1 : i}</span>
        `;
      }

      grid.appendChild(box);
    }
  }

  function updateCoins(n) {
    coins = n;
    coinEl.textContent = coins;
    const spinBtn = document.querySelector('.center-btn');
    if (coins <= 0) spinBtn.classList.add('disabled');
    else spinBtn.classList.remove('disabled');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function doSpin() {
    if (spinning) return;
    if (coins <= 0) { showToast('Coin kamu habis! 😢'); return; }

    spinning = true;
    updateCoins(coins - 1);

    // Pick random box (not center)
    const boxes = [0,1,2,3,5,6,7,8];
    const picked = boxes[Math.floor(Math.random() * boxes.length)];
    const prize = prizes[Math.floor(Math.random() * prizes.length)];

    // Animate spinning on picked box
    const box = document.getElementById('box-' + picked);
    box.classList.add('spinning');

    // Animate spin button
    const spinBtn = document.querySelector('.center-btn');
    spinBtn.querySelector('.spin-text').textContent = '...';
    spinBtn.classList.add('disabled');

    setTimeout(() => {
      box.classList.remove('spinning');
      box.classList.add('revealed');
      box.querySelector('.box-icon').textContent = prize.emoji;
      box.querySelector('.box-label').textContent = prize.name;

      spinBtn.querySelector('.spin-text').textContent = 'SPIN';
      if (coins > 0) spinBtn.classList.remove('disabled');

      // Bonus coin
      if (prize.bonus) updateCoins(coins + 2);

      // Show result
      setTimeout(() => showResult(prize), 400);
      spinning = false;
    }, 1800);
  }

  function showResult(prize) {
    document.getElementById('resultEmoji').textContent = prize.emoji;
    document.getElementById('resultTitle').textContent = prize.name;
    document.getElementById('resultDesc').textContent = prize.desc;
    document.getElementById('resultOverlay').classList.add('show');
    spawnParticles();
  }

  document.getElementById('btnClose').addEventListener('click', () => {
    document.getElementById('resultOverlay').classList.remove('show');
  });

  // Particles
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
      p.style.background = Math.random() > 0.5 ? '#ffcc00' : '#ff6b00';
      container.appendChild(p);
    }
  }

  function spawnParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (20 + Math.random() * 60) + '%';
      p.style.animationDuration = (1 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      p.style.width = p.style.height = (3 + Math.random() * 5) + 'px';
      p.style.background = Math.random() > 0.5 ? '#ffcc00' : '#ff6b00';
      container.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }

  buildGrid();
  createParticles();
</script>
</body>
</html>
